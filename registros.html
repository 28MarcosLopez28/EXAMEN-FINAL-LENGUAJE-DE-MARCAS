{% extends "base.html" %}

{% block content %}
<h1>Registros diarios</h1>

<form method="POST">
    <input name="descripcion" placeholder="¿Qué hiciste hoy?" required>
    <button type="submit">Guardar</button>
</form>

<ul>
{% for r in registros %}
<li>
    {{ r[1] }}
    <a href="/eliminar_registro/{{ r[0] }}">Eliminar</a>
</li>
{% endfor %}
</ul>
{% endblock %}
