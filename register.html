{% extends "base.html" %}

{% block content %}
<h1>Registro</h1>

<form method="POST">
    <input name="nombre" placeholder="Nombre" required>
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Registrarse</button>
</form>
{% endblock %}
