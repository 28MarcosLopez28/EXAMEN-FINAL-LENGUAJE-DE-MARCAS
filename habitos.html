{% extends "base.html" %}

{% block content %}
<h1>Hábitos</h1>

<form method="POST">
    <input name="nombre" placeholder="Nuevo hábito" required>
    <button type="submit">Crear</button>
</form>

<ul>
{% for h in habitos %}
<li>
    {{ h[1] }}
    <a href="/eliminar_habito/{{ h[0] }}">Eliminar</a>
</li>
{% endfor %}
</ul>
{% endblock %}
